name: Helm Chart CI

on:
  push:
    branches:
      - main

jobs:
  helm-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Helm Lint
        run: helm lint .

      - name: Package Helm Chart
        run: helm package .
