name: Package Helm Chart

on:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Package Helm Chart
        run: |
          helm package app-chart
          mkdir -p charts
          mv *.tgz charts/

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: helm-chart
          path: charts
